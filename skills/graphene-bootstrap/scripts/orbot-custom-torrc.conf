# Orbot Custom torrc — Multi-Port Per-App Circuit Isolation
#
# Paste this into: Orbot > Settings > Power User Mode > Custom Torrc
#
# Each SocksPort gets its own isolated Tor circuit pool.
# Streams on different ports NEVER share circuits (Tor default behavior).
#
# IsolateDestAddr — different destination IPs get different circuits within the same port
#
# The primary port (9050) is managed by Orbot itself — do NOT redefine it here.
# These are additional ports for per-app isolation via sing-box.

# --- App Proxy Ports ---
# Assign each port to one app (or app group) in sing-box route rules.

SocksPort 9052 IsolateDestAddr
SocksPort 9053 IsolateDestAddr
SocksPort 9054 IsolateDestAddr
SocksPort 9055 IsolateDestAddr
SocksPort 9056 IsolateDestAddr
SocksPort 9057 IsolateDestAddr
SocksPort 9058 IsolateDestAddr
SocksPort 9059 IsolateDestAddr
SocksPort 9060 IsolateDestAddr
SocksPort 9061 IsolateDestAddr
SocksPort 9062 IsolateDestAddr
SocksPort 9063 IsolateDestAddr
SocksPort 9064 IsolateDestAddr
SocksPort 9065 IsolateDestAddr
SocksPort 9066 IsolateDestAddr
SocksPort 9067 IsolateDestAddr
SocksPort 9068 IsolateDestAddr
SocksPort 9069 IsolateDestAddr


# --- DNS through Tor ---
# sing-box routes DNS to this port via its dns config.
DNSPort 5400

# --- Control Port (for verification) ---
# Enables querying circuit status from Termux.
# Remove after verification if not needed long-term.
ControlPort 9051
CookieAuthentication 0
